# Tên của quy trình CI/CD
name: Deploy to Local Windows Server

# Kích hoạt quy trình này mỗi khi có code được push lên nhánh `main`
on:
  push:
    branches: [ "main" ]

# Định nghĩa các công việc cần thực hiện
jobs:
  build-and-deploy:
    # Chạy công việc này trên runner mà chúng ta đã cài đặt trên server
    runs-on: self-hosted

    steps:
      # Bước 1: Lấy mã nguồn mới nhất từ repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Kiểm tra Docker và Môi trường Runner
      - name: Check Docker and Environment
        run: |
          echo "--- Docker Version ---"
          docker --version
          echo "--- Docker Info ---"
          docker info
          echo "--- Runner Working Directory ---"
          Get-Location
          echo "--- Files in C:/actions-runner ---"
          Get-ChildItem -Path C:/actions-runner
        shell: powershell

      # Bước 3: Đăng nhập vào Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Bước 4: Build và Push Docker image
      # Tên image sẽ có dạng: your_dockerhub_username/nln-website:latest
      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/nln-website:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/nln-website:latest
        shell: powershell

      # Bước 5: Dừng và xóa container cũ đang chạy trên server
      - name: Stop and Remove existing container
        run: |
          echo "Attempting to stop and remove container 'nln-container'..."
          docker rm -f nln-container
        continue-on-error: true # Bỏ qua lỗi nếu container chưa tồn tại
        shell: powershell

      # Bước 6: Kiểm tra sự tồn tại của file .env (Quan trọng để gỡ lỗi)
      - name: Check for .env file
        run: |
          echo "--> Checking for .env file at C:/actions-runner/.env"
          $env_path = "C:/actions-runner/.env"
          if (Test-Path $env_path) { 
            echo "OK: File .env found." 
          } else { 
            echo "FATAL ERROR: File .env NOT found at $env_path. Please create it on the server."
            exit 1 
          }
        shell: powershell

      # Bước 7: Khởi chạy container mới
      - name: Run new container
        run: |
          echo "Pulling latest image..."
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/nln-website:latest
          echo "Starting new container..."
          docker run -d -p 89:89 --name nln-container --restart always --env-file C:/actions-runner/.env ${{ secrets.DOCKERHUB_USERNAME }}/nln-website:latest
        shell: powershell

      # Bước 8: Kiểm tra trạng thái container sau khi khởi chạy
      - name: Verify container status
        run: |
          echo "Waiting for 5 seconds before checking container status..."
          Start-Sleep -Seconds 5
          echo "--- Current running containers (docker ps) ---"
          docker ps
          $container_status = docker ps -f "name=nln-container" --format "{{.Status}}"
          if ($container_status -like "Up*") {
            echo "SUCCESS: Container 'nln-container' is running."
          } else {
            echo "ERROR: Container 'nln-container' is not running or exited unexpectedly."
            echo "--- Container Logs (last 50 lines) ---"
            docker logs --tail 50 nln-container
            exit 1
          }
        shell: powershell

      # Bước 9: Dọn dẹp các image cũ không còn dùng đến
      - name: Cleanup old images
        run: docker image prune -f
        shell: powershell